apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: spinnaker
data:
  collector-not-used.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlphttp/newrelic:
        endpoint: https://otlp.nr-data.net
        headers:
          api-key: ${env:NR_API_KEY}
      debug/noop:
        verbosity: normal
        sampling_initial: 0
        sampling_thereafter: 0
      clickhouse:
        endpoint: tcp://192.168.19.204:9000?dial_timeout=10s&compress=lz4
        username: clickhouse
        password: changeme
        database: otel
        async_insert: true
        create_schema: true
      prometheusremotewrite:
        endpoint: https://prometheus.mcintosh.farm/api/v1/write
    processors:
      batch:
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlphttp/newrelic, debug/noop]
        metrics:
          receivers: [otlp]
          exporters: [otlphttp/newrelic, prometheusremotewrite]
        logs:
          receivers: [otlp]
          exporters: [otlphttp/newrelic, debug/noop]
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlphttp/newrelic:
        endpoint: https://otlp.nr-data.net
        headers:
          api-key: "${env:NR_API_KEY}"
      debug/noop:
        verbosity: normal
        sampling_initial: 0
        sampling_thereafter: 0
      prometheusremotewrite:
        endpoint: https://prometheus.mcintosh.farm/api/v1/write
    processors:
      batch:
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlphttp/newrelic,debug/noop]
        metrics:
          receivers: [otlp]
          exporters: [otlphttp/newrelic,prometheusremotewrite]
        logs:
          receivers: [otlp]
          exporters: [otlphttp/newrelic,debug/noop]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetrycollector
  namespace: spinnaker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetrycollector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetrycollector
    spec:
      containers:
      - name: otelcol
        args:
        - --config=/conf/collector.yaml
        image: otel/opentelemetry-collector-contrib:0.145.0
        envFrom:
        - secretRef:
            name: newrelic-api-key

        volumeMounts:
        - mountPath: /conf
          name: collector-config
      volumes:
      - configMap:
          items:
          - key: collector.yaml
            path: collector.yaml
          name: collector-config
        name: collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetrycollector
  namespace: spinnaker
spec:
  ports:
  - name: http-protobuff
    port: 4318
    protocol: TCP
    targetPort: 4318
  selector:
  selector:
    app.kubernetes.io/name: opentelemetrycollector
  type: ClusterIP
